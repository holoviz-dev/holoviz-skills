[workspace]
name = "holoviz-skills"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[environments]
default = ["docs", "lint", "dev"]
docs = ["docs"]
lint = ["lint"]

# =================== BASE ===================

[dependencies]
python = ">=3.12"
pip = "*"

[tasks]
setup-dev = { depends-on = [
    "build-stubs",
    "lint-install",
], description = "Set up development environment" }

# =================== DOCS ====================

[feature.docs.dependencies]
zensical = "*"

[feature.docs.tasks]
build-stubs = { cmd = "python scripts/build_stubs.py", description = "Generate docs/skills/*.md from SKILL.md files" }
docs = { cmd = "zensical serve", depends-on = [
    "build-stubs",
], description = "Serve documentation locally" }
docs-build = { cmd = "zensical build", depends-on = [
    "build-stubs",
], description = "Build static documentation" }

# =================== DEV ===================

[feature.dev.dependencies]
jupyterlab = "*"

[feature.dev.tasks]
lab = { cmd = "jupyter lab", description = "Launch JupyterLab" }

# =================== LINT ====================

[feature.lint.dependencies]
pre-commit = "*"
ruff = "*"
codespell = "*"
tomli = "*"

[feature.lint.tasks]
lint = { cmd = "pre-commit run --all-files", description = "Run all pre-commit hooks" }
lint-install = { cmd = "pre-commit install", description = "Install pre-commit hooks" }
format = { cmd = "ruff format .", description = "Format code with ruff" }
check = { cmd = "ruff check .", description = "Lint code with ruff" }
